apiVersion: apps/v1
kind: Deployment
metadata:
  name: abstergo-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abstergo-app
  template:
    metadata:
      labels:
        app: abstergo-app
    spec:
      containers:
      - name: abstergo-app
        image: navesing2112/abstergo-app:latest   # Jenkins pipeline will replace this
        ports:
        - containerPort: 3000
